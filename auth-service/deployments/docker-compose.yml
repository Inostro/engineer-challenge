version: '3.8'

services:
  auth-service:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    environment:
      - JWT_SECRET=your-secret-key-change-me-in-prod
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 30s
      timeout: 10s
      retries: 3